<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Mentor Chat - Child Connect</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="img/favicon.ico" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Inter:wght@600&family=Lobster+Two:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .chat-wrap { max-width: 900px; margin: 40px auto; }
        .chat-card { background: #fff; border-radius: 16px; box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08); overflow: hidden; }
        .chat-header { padding: 18px 22px; background: #FE5D37; color: #fff; font-weight: 700; }
        .chat-status { font-size: 13px; color: #2f6a3a; padding: 12px 22px 0; }
        .chat-status.error { color: #a82a2a; }
        .chat-messages { height: 420px; overflow-y: auto; padding: 20px; background: #f6f7fb; }
        .bubble { max-width: 76%; margin-bottom: 12px; border-radius: 12px; padding: 10px 12px; }
        .bubble.mine { margin-left: auto; background: #FE5D37; color: #fff; }
        .bubble.mentor { margin-right: auto; background: #fff; color: #243244; border: 1px solid #e5e9f2; }
        .bubble-meta { font-size: 11px; margin-top: 4px; opacity: 0.8; }
        .chat-form { padding: 16px; border-top: 1px solid #eef2f7; display: flex; gap: 10px; }
        .chat-form textarea { resize: none; min-height: 52px; }
        .hidden { display: none !important; }
        .empty-chat { color: #607085; font-size: 14px; text-align: center; margin-top: 24px; }
        .chat-gate { padding: 30px 22px; }
    </style>
</head>

<body>
    <div class="container-xxl bg-white p-0">
        <nav class="navbar navbar-expand-lg bg-white navbar-light sticky-top px-4 px-lg-5 py-lg-0">
            <a href="index.html" class="navbar-brand">
                <h1 class="m-0 text-primary"><i class="fa fa-book-reader me-3"></i>Child Connect</h1>
            </a>
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <div class="navbar-nav mx-auto">
                    <a href="index.html" class="nav-item nav-link">Home</a>
                    <a href="about.html" class="nav-item nav-link">About Us</a>
                    <a href="classes.html" class="nav-item nav-link">Our Mission</a>
                    <a href="adopt.html" class="nav-item nav-link">Adopt Now</a>
                    <a href="contact.html" class="nav-item nav-link">Contact Us</a>
                    <a href="mentor-chat.html" class="nav-item nav-link active">Mentor Chat</a>
                </div>
                <a href="admin-login.html" class="btn btn-primary rounded-pill px-3 d-none d-lg-block">Sign In<i class="fa fa-arrow-right ms-3"></i></a>
            </div>
        </nav>

        <div class="container chat-wrap">
            <div class="chat-card">
                <div class="chat-header">Mentor Support Chat</div>
                <div id="chatGate" class="chat-gate">
                    <p id="gateMessage" class="mb-3">Please sign in to start mentor chat.</p>
                    <button id="goSignIn" class="btn btn-primary me-2">Sign In</button>
                    <button id="goAdminPanel" class="btn btn-outline-primary hidden">Open Admin Panel</button>
                </div>

                <div id="chatPanel" class="hidden">
                    <div id="chatStatus" class="chat-status"></div>
                    <div id="chatMessages" class="chat-messages"></div>
                    <form id="chatSendForm" class="chat-form">
                        <textarea id="chatInput" class="form-control" placeholder="Type your message to mentor support..." required></textarea>
                        <button type="submit" class="btn btn-primary">Send</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/mentor-chat.js"></script>
</body>

</html>
